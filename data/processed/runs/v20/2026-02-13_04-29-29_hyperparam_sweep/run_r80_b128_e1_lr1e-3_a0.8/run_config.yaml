compression:
  always_build_traditional: true
  traditional_model_path: null
data:
  balance_ratio: 4.0
  binary: true
  max_samples: 2000000
  name: cicids2017
  num_clients: 4
  path: data/raw/CIC-IDS2017
  use_smote: true
evaluation:
  prediction_threshold: 0.3
  ratio_sweep_models:
  - models/tflite/saved_model_original.tflite
  - models/tflite/saved_model_qat_pruned_float32.tflite
  - models/tflite/saved_model_qat_ptq.tflite
  - models/tflite/saved_model_no_qat_ptq.tflite
  - models/tflite/saved_model_pruned_qat.tflite
  - models/tflite/saved_model_pruned_quantized.tflite
federated:
  batch_size: 128
  focal_loss_alpha: 0.8
  fraction_evaluate: 1.0
  fraction_fit: 1.0
  learning_rate: 0.001
  local_epochs: 1
  lr_decay_rate: 0.97
  lr_decay_type: cosine
  lr_drop_rate: 0.5
  lr_epochs_drop: 5
  lr_min: 0.0001
  min_available_clients: 4
  min_evaluate_clients: 4
  min_fit_clients: 4
  num_rounds: 80
  server_learning_rate: 1.0
  server_momentum: 0.5
  use_class_weights: true
  use_distillation: false
  use_focal_loss: true
  use_qat: true
model:
  name: mlp
version: v20
