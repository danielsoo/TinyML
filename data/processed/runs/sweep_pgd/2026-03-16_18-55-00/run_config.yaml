version: v2_PGD
data:
  name: cicids2017
  path: data/raw/MachineLearningCVE
  num_clients: 4
  max_samples: null
  binary: true
  use_smote: true
  balance_ratio: 4.0
model:
  name: mlp
evaluation:
  prediction_threshold: 0.3
  pgd_top_n: 4
  pgd_metric: f1_score
  ratio_sweep_models:
  - models/tflite/saved_model_original.tflite
  - models/tflite/saved_model_no_qat_ptq.tflite
  - models/tflite/saved_model_traditional_qat.tflite
  - models/tflite/saved_model_qat_ptq.tflite
  - models/tflite/saved_model_pruned_qat.tflite
  - models/tflite/saved_model_pruned_10x5_qat.tflite
  - models/tflite/saved_model_pruned_10x2_qat.tflite
  - models/tflite/saved_model_pruned_5x10_qat.tflite
adversarial_training:
  enabled: true
  attack: pgd
  epochs: 3
  epsilon: 0.05
  adv_ratio: 0.5
  pgd_steps: 10
  pgd_alpha: null
compression:
  always_build_traditional: true
  traditional_model_path: null
  distillation_first: false
  pruning_presets:
  - name: 10x5
    ratio: 0.1
  - name: 10x2
    ratio: 0.02
  - name: 5x10
    ratio: 0.05
federated:
  num_rounds: 70
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 3
  batch_size: 128
  learning_rate: 0.001
  use_class_weights: true
  use_focal_loss: true
  focal_loss_alpha: 0.25
  server_momentum: 0.5
  server_learning_rate: 0.1
  lr_decay_type: cosine
  lr_decay_rate: 0.95
  lr_drop_rate: 0.5
  lr_epochs_drop: 8
  lr_min: 0.0001
  use_qat: true
  use_adversarial_training: false
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
