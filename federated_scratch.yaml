# config/federated_scratch.yaml
# PSU e5-cse-135-01 전용: 데이터를 /scratch에 두어 홈 디스크 할당량 회피

# 버전 (결과/분석 파일 구분용)
version: "v1"

data:
  name: cicids2017
  path: "/scratch/yqp5187/Bot-IoT"

  num_clients: 4
  max_samples: 200000
  binary: true
  # 학습 시 불균형 완화: majority/minority 비율을 이 값 이하로 제한 (예: 5면 5:1)
  balance_ratio: 5.0

model:
  name: mlp

federated:
  num_rounds: 25
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 15
  batch_size: 128
  learning_rate: 0.0005
  use_class_weights: true
  use_qat: true
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
