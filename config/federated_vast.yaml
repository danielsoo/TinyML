# config/federated_vast.yaml
# Vast.ai: single data path inside project (one full rsync is enough)

# Version (for result/analysis folder naming)
version: "v12"

data:
  name: cicids2017
  # Relative to project root → /workspace/TinyML-main/data/raw/CIC-IDS2017
  path: "data/raw/CIC-IDS2017"

  num_clients: 4
  # OOM mitigation: if OOM near round 41, reduce to 1M or keep num_rounds 40
  max_samples: 1500000
  binary: true
  use_smote: true
  # 8:2 = normal 80%, attack 20% (expected deployment ratio)
  balance_ratio: 4.0

model:
  name: mlp

federated:
  num_rounds: 50
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 5
  batch_size: 128
  learning_rate: 0.0005
  # Per-round LR decay: lr = learning_rate * (lr_decay ** (round-1)). 1.0 = no decay.
  lr_decay: 0.99
  use_class_weights: true
  use_focal_loss: true
  # alpha upweights minority (attack). Use >= 0.9 for 8:2 training to avoid missing attacks
  focal_loss_alpha: 0.92
  use_callbacks: false
  server_momentum: 0.9
  server_learning_rate: 1.0
  use_qat: true
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
