# config/federated_scratch.yaml
# PSU e5-cse-135-01: data on /scratch to avoid home disk quota

# Version (for result/analysis folder naming)
version: "v8"

data:
  name: cicids2017
  path: "/scratch/yqp5187/Bot-IoT"

  num_clients: 4
  max_samples: 1500000
  binary: true
  use_smote: true
  # balance_ratio: 5.0 causes train/test distribution mismatch -> accuracy drop, disabled, use class_weights only
  # balance_ratio: 10.0  # Uncomment to try relaxed ratio

model:
  name: mlp

federated:
  num_rounds: 25
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 15
  batch_size: 128
  learning_rate: 0.001
  use_class_weights: true
  use_focal_loss: true
  use_callbacks: false
  server_momentum: 0.9
  server_learning_rate: 1.0
  use_qat: true
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
