# config/federated_local.yaml
# Local environment config

# Version (for result/analysis folder naming). 로컬/서버 동일하게 맞추면 runs/ 폴더 통일
version: "v12"

data:
  # Choose cicids2017, bot_iot, or mnist
  name: cicids2017

  # Data path for CIC-IDS2017 (*.pcap_ISCX.csv). Use data/raw/Bot-IoT for Bot-IoT dataset.
  path: "data/raw/CIC-IDS2017"

  # Number of clients (4 devices)
  num_clients: 4

  # 데이터 무제한 (max_samples 없음 = 전부 사용)
  # max_samples: 1500000  # 제한 쓰려면 주석 해제

  # balance_ratio: 1.0 = 5:5 (정상:공격 50:50)
  binary: true
  use_smote: true
  balance_ratio: 1.0   # 5:5

model:
  # mlp or cnn (usually mlp for Bot-IoT)
  name: mlp

federated:
  # Increased rounds/epochs for better accuracy
  num_rounds: 25

  # Fraction of clients participating per round (1.0 = all)
  fraction_fit: 1.0
  fraction_evaluate: 1.0

  # Local training parameters
  local_epochs: 15
  batch_size: 128
  learning_rate: 0.001
  
  # Class balancing
  use_class_weights: true
  use_focal_loss: true
  focal_loss_alpha: 0.75
  server_momentum: 0.9
  server_learning_rate: 1.0
  
  # Quantization-Aware Training (QAT)
  use_qat: true

  # For strategy internal use (same as 4 devices)
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4

