# config/federated_bot_iot.yaml
# Bot-IoT dataset + imbalance handling (SMOTE, balance_ratio, class_weights, focal_loss)

version: "bot_iot"

data:
  name: bot_iot
  path: "data/raw/Bot-IoT"
  num_clients: 4
  max_samples: 200000

  # Mitigate imbalance: undersample majority to balance_ratio * minority (e.g. 3 -> minority:majority <= 1:3)
  balance_ratio: 3.0
  use_smote: true

model:
  name: mlp

federated:
  num_rounds: 10
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 5
  batch_size: 128
  learning_rate: 0.001
  use_class_weights: true
  use_focal_loss: true
  use_qat: false
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
