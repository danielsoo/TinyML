# config/federated_local.yaml
# Local environment config

# Version (for result/analysis folder naming, e.g. v1, v2_balanced)
version: "sweep_run1"

data:
  # Choose cicids2017, bot_iot, or mnist
  name: cicids2017

  # Data path (same folder contains both Bot-IoT and CIC-IDS2017)
  path: "data/raw/MachineLearningCVE"

  # Number of clients (4 devices)
  num_clients: 4

  # Limit samples to avoid long training (increase for more attack samples)
  max_samples: 1500000 
  
  # For CIC-IDS2017: binary (BENIGN vs ATTACK) or multi-class
  binary: true
  use_smote: true
  balance_ratio: 4.0

model:
  # mlp or cnn (usually mlp for Bot-IoT)
  name: mlp

federated:
  # Increased rounds/epochs for better accuracy
  num_rounds: 60

  # Fraction of clients participating per round (1.0 = all)
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 2
  batch_size: 128
  learning_rate: 0.001
  use_class_weights: false   # focal loss already handles imbalance; stacking both causes NaN
  use_focal_loss: true
  focal_loss_alpha: 0.35     # matches federated_local.yaml; 0.7 + class_weights explodes
  use_distillation: false
  server_momentum: 0.5
  server_learning_rate: 0.1  # 1.0 + momentum=0.5 → weight explosion after round 1 → NaN
  lr_decay_type: cosine
  lr_decay_rate: 0.97
  lr_drop_rate: 0.5
  lr_epochs_drop: 5
  lr_min: 0.0001
  use_qat: true
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4

compression:
  always_build_traditional: true
  traditional_model_path: null

# Distillation hyperparams (used by run_experiment_sweep.py)
distillation:
  epochs: 10
  temperature: 3.0
  alpha: 0.3

# Pruning hyperparams (used by run_experiment_sweep.py)
pruning:
  finetune_epochs: 2