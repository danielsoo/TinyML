# config/federated_ton_iot.yaml
# TON_IoT (ToN_IoT) - UNSW Canberra IoT/IIoT Cybersecurity
# Academic use free. Processed/Train_Test CSV in data_path or data_path/Train_Test_datasets

version: "ton_iot"

data:
  name: ton_iot
  path: "data/raw/TON_IoT"
  num_clients: 4
  max_samples: 200000

  binary: true
  balance_ratio: 3.0
  use_smote: true

model:
  name: mlp

federated:
  num_rounds: 10
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 5
  batch_size: 128
  learning_rate: 0.001
  use_class_weights: true
  use_focal_loss: true
  use_qat: false
  min_fit_clients: 4
  min_evaluate_clients: 4
  min_available_clients: 4
